<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | SharaMara Studio</title>
    
    <meta name="description" content="Pogledajte radove SharaMara Studio - ekskluzivni nail art, manikir i premium dizajn noktiju u Beogradu.">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff4fa3;
            --bg: #0b0b10;
            --card-bg: #1a1a20;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15,15,20,0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            padding: 12px 5%;
            font-size: 13px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .topbar a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* HEADER */
        .header {
            padding: 140px 20px 60px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 8vw, 60px);
            letter-spacing: -1px;
        }

        .header p {
            opacity: 0.6;
            margin-top: 10px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            padding: 8px 16px;
            border: 1px solid rgba(255, 79, 163, 0.2);
            border-radius: 30px;
        }

        .back-link:hover {
            background: rgba(255, 79, 163, 0.1);
            transform: translateX(-5px);
        }

        /* PORTFOLIO GRID */
        .portfolio {
            padding: 0 5% 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: auto;
        }

        /* IMAGE CARD */
        .img-box {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            height: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s transform;
        }

        /* Hover efekti */
        .img-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .img-box:hover img {
            transform: scale(1.05);
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 45px;
            color: white;
            line-height: 1;
            transition: 0.3s;
        }

        .close:hover { color: var(--accent); }

        /* Loading animacija za slike */
        .img-box.loading {
            background: linear-gradient(110deg, #1a1a20 8%, #252530 18%, #1a1a20 33%);
            background-size: 200% 100%;
            animation: shimmer 1.5s linear infinite;
        }

        @keyframes shimmer {
            to { background-position-x: -200%; }
        }

        @media (max-width: 600px) {
            .portfolio { grid-template-columns: 1fr 1fr; gap: 10px; }
            .img-box { height: 250px; border-radius: 15px; }
            .header h1 { font-size: 32px; }
            .topbar { justify-content: center; gap: 15px; }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div>📞 <a href="tel:0640066218">064 006 6218</a></div>
        <div>✉️ <a href="mailto:st.marija5@gmail.com">st.marija5@gmail.com</a></div>
    </div>

    <header class="header">
        <h1>Naši Radovi</h1>
        <p>Premium Nails & Design</p>
        <a href="index.html" class="back-link">← Povratak</a>
    </header>

    <main class="portfolio" id="portfolio-grid">
        </main>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="Uvećano" oncontextmenu="return false;">
    </div>

    <script>
        const grid = document.getElementById('portfolio-grid');
        
        // Generisanje 18 slika sa optimizacijom
        for (let i = 1; i <= 18; i++) {
            const box = document.createElement('div');
            box.className = 'img-box loading';
            
            const img = document.createElement('img');
            img.src = `images/${i}.jpg`;
            img.alt = `Nails by SharaMara ${i}`;
            img.loading = 'lazy'; // Browser optimizacija za učitavanje
            
            // Kada se slika učita, skini "loading" animaciju
            img.onload = () => box.classList.remove('loading');
            
            box.onclick = () => openLightbox(img.src);
            box.appendChild(img);
            grid.appendChild(box);
        }

        function openLightbox(src) {
            const lb = document.getElementById("lightbox");
            const lbImg = document.getElementById("lightbox-img");
            lbImg.src = src;
            lb.classList.add("active");
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById("lightbox").classList.remove("active");
            document.body.style.overflow = 'auto';
        }

        // ESC ključ za zatvaranje
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });
    </script>

</body>
</html>
